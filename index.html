<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser-Based Treasure Hunt</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--card); padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); margin-bottom: 20px;}
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 5px;}
        .hidden { display: none; }
        .progress-bar { height: 10px; background: #334155; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="auth-screen" class="card">
        <h2>Register Team</h2>
        <input type="text" id="team-name" placeholder="Enter Team Name">
        <button onclick="startGame()">Start Hunt</button>
    </div>

    <div id="game-screen" class="card hidden">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <h3 id="stage-info">Question 1</h3>
        <p id="question-text"></p>
        <input type="text" id="answer-input" placeholder="Type answer here...">
        <button onclick="checkAnswer()">Submit Answer</button>
        <button onclick="showHint()" style="background: #475569;">Get Hint (-50 pts)</button>
        <p id="hint-display" style="color: #94a3b8; font-style: italic;"></p>
        <p>Current Score: <span id="score-display">1000</span></p>
    </div>

    <div id="winner-screen" class="card hidden">
        <h2>🎉 Finished!</h2>
        <p id="final-stats"></p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        const questions = [
            { q: "What has keys but can't open locks?", a: "piano", h: "It's a musical instrument." },
            { q: "What gets wetter the more it dries?", a: "towel", h: "You use it after a shower." },
            { q: "The more you take, the more you leave behind.", a: "footsteps", h: "Think about walking." }
        ];

        let gameState = {
            team: "",
            currentStage: 0,
            score: 1000,
            startTime: null
        };

        function startGame() {
            const name = document.getElementById('team-name').value;
            if(!name) return alert("Enter a name!");
            
            gameState.team = name;
            gameState.startTime = Date.now();
            
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderStage();
        }

        function renderStage() {
            if(gameState.currentStage >= questions.length) {
                showWinner();
                return;
            }
            const q = questions[gameState.currentStage];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('stage-info').innerText = `Question ${gameState.currentStage + 1}`;
            document.getElementById('score-display').innerText = gameState.score;
            document.getElementById('progress').style.width = (gameState.currentStage / questions.length * 100) + "%";
            document.getElementById('hint-display').innerText = "";
        }

        function checkAnswer() {
            const userAns = document.getElementById('answer-input').value.toLowerCase().trim();
            if(userAns === questions[gameState.currentStage].a) {
                gameState.currentStage++;
                document.getElementById('answer-input').value = "";
                renderStage();
            } else {
                alert("Wrong! Try again.");
            }
        }

        function showHint() {
            gameState.score -= 50;
            document.getElementById('hint-display').innerText = "Hint: " + questions[gameState.currentStage].h;
            document.getElementById('score-display').innerText = gameState.score;
        }

        function showWinner() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('winner-screen').classList.remove('hidden');
            const timeTaken = Math.floor((Date.now() - gameState.startTime) / 1000);
            document.getElementById('final-stats').innerText = `Team ${gameState.team} finished with ${gameState.score} points in ${timeTaken} seconds!`;
        }
    </script>
</body>
</html>
